<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="峡谷讨伐日记 — 潘潘和蒲蒲的任务管理">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>峡谷讨伐日记</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <!-- Sidebar (Desktop) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="logo"><img class="logo-img" src="/img/taofa.png" alt=""> 峡谷讨伐日记</h1>
    </div>

    <div class="love-counter" id="love-counter">
      <span class="love-heart">💕</span>
      <span class="love-text">在一起</span>
      <span class="love-days" id="love-days">0</span>
      <span class="love-text">天</span>
    </div>



    <nav class="sidebar-nav">
      <button class="nav-btn active" data-view="daily" id="nav-daily">
        <span class="nav-icon">📅</span>
        <span>每日</span>
      </button>
      <button class="nav-btn" data-view="monthly" id="nav-monthly">
        <span class="nav-icon">🗓️</span>
        <span>每月</span>
      </button>
      <button class="nav-btn" id="nav-pomodoro">
        <img class="nav-icon-img" src="/img/pomodoro.png" alt="">
        <span>番茄钟</span>
      </button>
      <button class="nav-btn" id="nav-checkin">
        <span class="nav-icon">💧</span>
        <span>打卡</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="action-btn" id="btn-import-ics">
        <span>📥</span> 导入 ICS
      </button>
      <button class="action-btn" id="btn-toggle-theme">
        <span id="theme-icon">🌙</span> <span id="theme-label">暗色模式</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Header Bar -->
    <header class="main-header" id="main-header">
      <button class="menu-toggle" id="btn-menu">☰</button>
      <div class="header-center">
        <h2 id="header-title">今日任务</h2>
        <div class="date-nav" id="date-nav">
          <button class="date-nav-btn" id="btn-prev">‹</button>
          <span class="date-display" id="date-display"></span>
          <button class="date-nav-btn" id="btn-next">›</button>
          <button class="date-nav-btn today-btn" id="btn-today">今天</button>
        </div>
      </div>
      <button class="add-btn" id="btn-add-task">
        <span>+</span>
      </button>
    </header>

    <!-- Daily View -->
    <section class="view-container" id="view-daily">
      <div class="daily-toolbar">
        <div class="daily-person-filter">
          <button class="filter-pill active" data-assignee="all">
            <img class="filter-avatar" src="/img/all.png" alt=""> 全部
          </button>
          <button class="filter-pill" data-assignee="潘潘">
            <img class="filter-avatar" src="/img/panpan.png" alt=""> 潘潘
          </button>
          <button class="filter-pill" data-assignee="蒲蒲">
            <img class="filter-avatar" src="/img/pupu.png" alt=""> 蒲蒲
          </button>
        </div>
      </div>
      <div class="task-columns">
        <div class="task-column" id="col-todo">
          <div class="column-header">
            <span class="column-dot todo"></span>
            <h3>待办</h3>
            <span class="column-count" id="count-todo">0</span>
          </div>
          <div class="task-list" id="list-todo"></div>
        </div>

        <div class="task-column" id="col-done">
          <div class="column-header">
            <span class="column-dot done"></span>
            <h3>已完成</h3>
            <span class="column-count" id="count-done">0</span>
            <button class="clear-done-btn" id="btn-clear-done" title="清除已完成">🗑️</button>
          </div>
          <div class="task-list" id="list-done"></div>
        </div>
      </div>
    </section>

    <!-- Monthly View -->
    <section class="view-container hidden" id="view-monthly">
      <div class="monthly-toolbar">
        <div class="monthly-person-filter">
          <button class="filter-pill active" data-assignee="all">
            <img class="filter-avatar" src="/img/all.png" alt=""> 全部
          </button>
          <button class="filter-pill" data-assignee="潘潘">
            <img class="filter-avatar" src="/img/panpan.png" alt=""> 潘潘
          </button>
          <button class="filter-pill" data-assignee="蒲蒲">
            <img class="filter-avatar" src="/img/pupu.png" alt=""> 蒲蒲
          </button>
        </div>
        <div class="monthly-status-filter">
          <button class="filter-pill small active" data-status="all">全部</button>
          <button class="filter-pill small" data-status="todo">未完成</button>
          <button class="filter-pill small" data-status="done">已完成</button>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- Checkin View -->
    <section class="view-container hidden" id="view-checkin">
      <div class="checkin-container">
        <div class="checkin-person-toggle">
          <button class="checkin-person-btn active" data-assignee="潘潘">
            <img class="filter-avatar" src="/img/panpan.png" alt=""> 潘潘
          </button>
          <button class="checkin-person-btn" data-assignee="蒲蒲">
            <img class="filter-avatar" src="/img/pupu.png" alt=""> 蒲蒲
          </button>
        </div>

        <div class="water-tracker">
          <div class="glass-section">
            <div class="glass-container" id="glass-container">
              <div class="glass-body">
                <div class="glass-water" id="glass-water"></div>
                <div class="glass-bubbles">
                  <span class="bubble"></span>
                  <span class="bubble"></span>
                  <span class="bubble"></span>
                </div>
              </div>
              <div class="glass-base"></div>
            </div>
            <div class="water-stats">
              <div class="water-amount"><span id="water-amount-text">0</span>ml</div>
              <div class="water-goal">/ <span id="water-goal-text">2000</span>ml</div>
              <div class="water-progress-label" id="water-progress-label">还差 2000ml</div>
            </div>
          </div>

          <div class="water-controls">
            <h4>加水</h4>
            <div class="water-quick-buttons">
              <button class="water-quick-btn" data-amount="100">100ml</button>
              <button class="water-quick-btn" data-amount="500">500ml</button>
              <button class="water-quick-btn" data-amount="1000">1000ml</button>
            </div>
            <div class="water-custom">
              <input type="number" id="water-custom-input" placeholder="自定义ml" min="1" max="5000">
              <button class="water-custom-add-btn" id="water-custom-add">+</button>
            </div>
            <div class="water-log" id="water-log">
              <div class="water-log-empty">今天还没有喝水记录 💧</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Bottom Nav (Mobile) -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-btn active" data-view="daily">
      <span class="nav-icon">📅</span>
      <span>每日</span>
    </button>
    <button class="bottom-nav-btn" data-view="monthly">
      <span class="nav-icon">🗓️</span>
      <span>每月</span>
    </button>
    <button class="bottom-nav-btn add-fab" id="fab-add">
      <span class="nav-icon">➕</span>
    </button>
    <button class="bottom-nav-btn" id="mobile-pomodoro">
      <span class="nav-icon"><img class="nav-icon-img" src="/img/pomodoro.png" alt=""></span>
      <span>番茄钟</span>
    </button>
    <button class="bottom-nav-btn" id="mobile-checkin">
      <span class="nav-icon">💧</span>
      <span>打卡</span>
    </button>
    <button class="bottom-nav-btn" id="mobile-theme-toggle">
      <span class="nav-icon" id="mobile-theme-icon">🌙</span>
      <span>主题</span>
    </button>
  </nav>

  <!-- Task Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal" id="task-modal">
      <div class="modal-header">
        <h3 id="modal-title">新建任务</h3>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-id">

        <div class="form-group">
          <label for="task-title">任务标题</label>
          <input type="text" id="task-title" placeholder="要做什么？" required autocomplete="off">
        </div>

        <div class="form-group">
          <label for="task-description">描述（可选）</label>
          <textarea id="task-description" placeholder="补充说明..." rows="2"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-assignee">指派给</label>
            <select id="task-assignee">
              <option value="潘潘">潘潘</option>
              <option value="蒲蒲">蒲蒲</option>
            </select>
          </div>
          <div class="form-group">
            <label for="task-priority">优先级</label>
            <select id="task-priority">
              <option value="1">🔴 高</option>
              <option value="2" selected>🟡 中</option>
              <option value="3">🟢 低</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-date">日期</label>
            <input type="date" id="task-date">
          </div>
          <div class="form-group">
            <label for="task-time">时间</label>
            <input type="time" id="task-time">
          </div>
        </div>

        <div class="form-group hidden" id="auto-complete-group">
          <label class="checkbox-label">
            <input type="checkbox" id="task-auto-complete" checked>
            ⏰ 到时间自动完成
          </label>
        </div>

        <div class="form-group">
          <label for="task-category">分类</label>
          <select id="task-category">
            <option value="">无分类</option>
          </select>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="task-recurring">
            重复任务
          </label>
        </div>

        <div class="recurring-options hidden" id="recurring-options">
          <div class="form-row">
            <div class="form-group">
              <label for="task-recurring-type">重复类型</label>
              <select id="task-recurring-type">
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="monthly">每月</option>
                <option value="custom">自定义</option>
              </select>
            </div>
            <div class="form-group">
              <label for="task-recurring-interval">间隔</label>
              <input type="number" id="task-recurring-interval" value="1" min="1" max="365">
            </div>
          </div>
          <div class="form-group">
            <label for="task-recurring-end">结束日期（可选）</label>
            <input type="date" id="task-recurring-end">
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="btn-cancel">取消</button>
          <button type="button" class="btn btn-danger hidden" id="btn-delete">删除</button>
          <button type="submit" class="btn btn-primary" id="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ICS Import Modal -->
  <div class="modal-overlay hidden" id="ics-modal-overlay">
    <div class="modal" id="ics-modal">
      <div class="modal-header">
        <h3>📥 导入 ICS 文件</h3>
        <button class="modal-close" id="ics-modal-close">×</button>
      </div>
      <div class="ics-content">
        <div class="ics-upload" id="ics-upload-area">
          <div class="ics-upload-icon">📄</div>
          <p>点击或拖拽 .ics 文件到此处</p>
          <input type="file" id="ics-file-input" accept=".ics,.ical" hidden>
        </div>

        <div class="hidden" id="ics-preview">
          <div class="form-group">
            <label for="ics-assignee">导入给</label>
            <select id="ics-assignee">
              <option value="潘潘">潘潘</option>
              <option value="蒲蒲">蒲蒲</option>
            </select>
          </div>
          <div class="ics-task-list" id="ics-task-list"></div>
          <div class="form-actions">
            <button class="btn btn-secondary" id="ics-cancel">取消</button>
            <button class="btn btn-primary" id="ics-confirm">确认导入 (<span id="ics-count">0</span> 项)</button>
          </div>
        </div>
      </div>
    </div>
  </div>



  <!-- Pomodoro Modal -->
  <div class="modal-overlay hidden" id="pomodoro-overlay">
    <div class="modal" id="pomodoro-modal">
      <div class="modal-header">
        <h3 id="pomodoro-title">🍅 番茄钟</h3>
        <button class="modal-close" id="pomodoro-close">×</button>
      </div>
      <div class="pomodoro-content" id="pomodoro-content">
        <!-- Setup Screen -->
        <div class="pomodoro-setup" id="pomodoro-setup">
          <div class="pomodoro-task-label" id="pomodoro-task-label"></div>
          <div class="form-group">
            <label>专注时间（分钟）</label>
            <div class="pomodoro-time-picks" id="focus-picks">
              <button class="time-pick-btn" data-min="15">15</button>
              <button class="time-pick-btn active" data-min="25">25</button>
              <button class="time-pick-btn" data-min="45">45</button>
              <button class="time-pick-btn" data-min="60">60</button>
            </div>
          </div>
          <div class="form-group">
            <label>休息时间（分钟）</label>
            <div class="pomodoro-time-picks" id="rest-picks">
              <button class="time-pick-btn active" data-min="5">5</button>
              <button class="time-pick-btn" data-min="10">10</button>
              <button class="time-pick-btn" data-min="15">15</button>
            </div>
          </div>
          <button class="btn btn-primary pomodoro-start-btn" id="pomodoro-start">开始专注</button>
        </div>
        <!-- Timer Screen -->
        <div class="pomodoro-timer hidden" id="pomodoro-timer">
          <div class="pomodoro-status" id="pomodoro-status">专注中</div>
          <div class="pomodoro-ring">
            <svg class="pomodoro-svg" viewBox="0 0 200 200">
              <circle class="pomodoro-track" cx="100" cy="100" r="90" />
              <circle class="pomodoro-progress" id="pomodoro-progress" cx="100" cy="100" r="90" />
            </svg>
            <div class="pomodoro-time" id="pomodoro-time">25:00</div>
          </div>
          <div class="pomodoro-round" id="pomodoro-round">第 1 轮</div>
          <div class="pomodoro-controls">
            <button class="btn btn-secondary" id="pomodoro-pause">暂停</button>
            <button class="btn btn-danger" id="pomodoro-stop">结束</button>
          </div>
        </div>
        <!-- Round Complete Screen -->
        <div class="pomodoro-complete hidden" id="pomodoro-complete">
          <div class="pomodoro-complete-icon">🎉</div>
          <div class="pomodoro-complete-text" id="pomodoro-complete-text">休息结束！</div>
          <div class="pomodoro-complete-summary" id="pomodoro-complete-summary">已完成 1 轮</div>
          <button class="btn btn-primary" id="pomodoro-next">进入下一轮</button>
          <button class="btn btn-secondary" id="pomodoro-finish">结束番茄钟</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/views/daily.js"></script>
  <script src="/js/views/monthly.js"></script>
  <script src="/js/views/checkin.js"></script>
  <script src="/js/components/task-modal.js"></script>
  <script src="/js/components/ics-import.js"></script>
  <script src="/js/components/pomodoro.js"></script>
  <script src="/js/app.js"></script>
</body>

</html>

  <circle cx="18" cy="72" r="6.5" fill="url(#fG)"/>
  <circle cx="16" cy="70" r="2" fill="#FFCCBC" opacity="0.15"/>
  <circle cx="82" cy="68" r="6" fill="url(#fG)"/>

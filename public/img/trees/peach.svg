  <circle cx="28" cy="26" r="3" fill="#fff" opacity="0.2"/>
  <circle cx="66" cy="22" r="2.5" fill="#fff" opacity="0.18"/>
  <circle cx="44" cy="12" r="2" fill="#fff" opacity="0.22"/>

    <circle cx="0" cy="0" r="5.5" fill="#FFEB3B"/>
    <circle cx="-1.5" cy="-1.5" r="2" fill="#FFF9C4" opacity="0.25"/>
    <circle cx="1.5" cy="0.5" r="1.2" fill="#F9A825" opacity="0.35"/>

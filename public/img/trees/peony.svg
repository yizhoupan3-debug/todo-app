    <path d="M0 -6 Q-14 -26 -20 -18 Q-24 -8 -14 -2 Q-6 2 0 -6Z" fill="#F06292"/>
    <path d="M0 -6 Q-20 -12 -22 -4 Q-20 4 -10 4 Q-4 2 0 -6Z" fill="#EC407A"/>
    <path d="M0 -6 Q20 -12 22 -4 Q20 4 10 4 Q4 2 0 -6Z" fill="#E91E63"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="tG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <radialGradient id="cG" cx="44%" cy="38%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </radialGradient>
    <filter id="sh"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <ellipse cx="50" cy="110" rx="24" ry="8" fill="#3E2723" opacity="0.2" filter="url(#sh)"/>
  <!-- Trunk -->
  <rect x="45" y="73" width="10" height="36" rx="3" fill="url(#tG)"/>
  <rect x="47" y="75" width="3" height="32" rx="1.5" fill="#8D6E63" opacity="0.12"/>

  <path d="M45 88 Q33 82 30 90" stroke="#6D4C41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M55 80 Q64 76 68 82" stroke="#6D4C41" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Dead canopy -->
  <circle cx="50" cy="58" r="18" fill="url(#cG)"/>
  <circle cx="36" cy="64" r="11" fill="#6D4C41" opacity="0.6"/>
  <circle cx="62" cy="61" r="11" fill="#6D4C41" opacity="0.55"/>
  <circle cx="50" cy="48" r="9" fill="#795548" opacity="0.5"/>
  <!-- Dead / bare twigs -->
  <path d="M34 56 Q28 52 32 58" stroke="#8D6E63" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M64 53 Q70 50 67 56" stroke="#8D6E63" stroke-width="1.2" fill="none" opacity="0.4"/>
  <!-- Sparse dead leaves -->

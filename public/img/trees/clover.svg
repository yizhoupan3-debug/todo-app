<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="l1" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <radialGradient id="l2" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#43A047"/>
    </radialGradient>
    <radialGradient id="l3" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </radialGradient>
    <linearGradient id="stG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="sh"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="24" ry="7" fill="#3E2723" opacity="0.18" filter="url(#sh)"/>
  <path d="M50 112 Q50 95 50 74" stroke="url(#stG)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Four leaf clover -->
  <g transform="translate(50, 52)">
    <ellipse cx="-13" cy="8" rx="13" ry="11" fill="url(#l1)" transform="rotate(-10 -13 8)"/>
    <ellipse cx="13" cy="8" rx="13" ry="11" fill="url(#l2)" transform="rotate(10 13 8)"/>
    <ellipse cx="-9" cy="-7" rx="12" ry="10" fill="url(#l3)" transform="rotate(-5 -9 -7)"/>
    <ellipse cx="9" cy="-7" rx="12" ry="10" fill="url(#l2)" transform="rotate(5 9 -7)"/>
    <!-- Center vein pattern -->
    <path d="M-5 5 Q-2 -6 0 -14 Q2 -6 5 5 Q2 0 0 -2 Q-2 0 -5 5Z" fill="#E8F5E9" opacity="0.35"/>
    <!-- Leaf highlights -->
    <ellipse cx="-14" cy="4" rx="4" ry="3" fill="#C8E6C9" opacity="0.25" transform="rotate(-15 -14 4)"/>
    <ellipse cx="14" cy="4" rx="4" ry="3" fill="#E8F5E9" opacity="0.2" transform="rotate(15 14 4)"/>
    <ellipse cx="-10" cy="-10" rx="3.5" ry="2.5" fill="#C8E6C9" opacity="0.2" transform="rotate(-8 -10 -10)"/>
    <ellipse cx="10" cy="-10" rx="3.5" ry="2.5" fill="#E8F5E9" opacity="0.18" transform="rotate(8 10 -10)"/>
  </g>
</svg>

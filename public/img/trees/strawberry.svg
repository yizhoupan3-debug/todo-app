<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="fG" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#FFCDD2"/>
      <stop offset="35%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
    <linearGradient id="sG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="50%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="30" ry="8" fill="#3E2723" opacity="0.15" filter="url(#s)"/>
  <!-- Low spreading stems — strawberries are ground-hugging -->
  <path d="M50 112 Q42 106 34 100" stroke="url(#sG)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M50 112 Q58 106 66 100" stroke="#2E7D32" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M34 100 Q28 96 22 92" stroke="#388E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66 100 Q72 96 78 92" stroke="#388E3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Trifoliate leaves — low, spreading -->
  <path d="M34 100 Q20 92 14 96 Q20 102 34 100Z" fill="#388E3C"/>
  <path d="M34 100 Q28 88 36 86 Q38 92 34 100Z" fill="#43A047"/>
  <path d="M66 100 Q80 92 86 96 Q80 102 66 100Z" fill="#558B2F"/>
  <path d="M66 100 Q72 88 64 86 Q62 92 66 100Z" fill="#43A047"/>
  <path d="M50 112 Q44 102 38 100 Q42 106 50 112Z" fill="#2E7D32"/>
  <!-- Main strawberry — HEART-SHAPED, wider at top, pointed at bottom -->
  <path d="M50 50 Q38 44 32 50 Q26 60 30 70 Q36 80 50 88 Q64 80 70 70 Q74 60 68 50 Q62 44 50 50Z" fill="url(#fG)"/>
  <!-- Depth shading -->
  <path d="M50 50 Q40 46 34 52 Q28 60 32 70 Q38 78 50 86 Q50 66 50 50Z" fill="#EF5350" opacity="0.3"/>
  <!-- Calyx firmly on top -->
  <path d="M50 50 Q42 42 36 46 Q40 50 50 50Z" fill="#2E7D32"/>
  <path d="M50 50 Q50 40 54 42 Q52 48 50 50Z" fill="#43A047"/>
  <path d="M50 50 Q58 42 64 46 Q60 50 50 50Z" fill="#388E3C"/>
  <!-- Tiny seeds — many, scattered -->
  <circle cx="40" cy="58" r="1" fill="#FFF9C4" opacity="0.6"/>
  <circle cx="46" cy="62" r="1" fill="#FFF9C4" opacity="0.55"/>
  <circle cx="54" cy="60" r="1" fill="#FFF9C4" opacity="0.6"/>
  <circle cx="62" cy="58" r="1" fill="#FFF9C4" opacity="0.55"/>
  <circle cx="38" cy="68" r="1" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="48" cy="72" r="1" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="56" cy="70" r="1" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="64" cy="66" r="1" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="44" cy="78" r="1" fill="#FFF9C4" opacity="0.45"/>
  <circle cx="56" cy="78" r="1" fill="#FFF9C4" opacity="0.45"/>
  <!-- Second strawberry — smaller -->
  <path d="M22 82 Q18 78 16 82 Q14 88 16 92 Q20 96 24 92 Q28 88 26 82 Q24 78 22 82Z" fill="#E53935"/>
  <path d="M22 82 Q20 80 18 82 Q18 86 22 82Z" fill="#2E7D32"/>
  <!-- Third strawberry -->
  <path d="M76 80 Q72 76 70 80 Q68 86 70 90 Q74 94 78 90 Q82 86 80 80 Q78 76 76 80Z" fill="#E53935"/>
  <path d="M76 80 Q74 78 72 80 Q72 84 76 80Z" fill="#388E3C"/>
</svg>

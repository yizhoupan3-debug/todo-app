<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="wG" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pG" cx="42%" cy="30%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="40%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
    <radialGradient id="padG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <filter id="sh"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="28" ry="8" fill="#3E2723" opacity="0.15" filter="url(#sh)"/>
  <!-- Water -->
  <ellipse cx="50" cy="108" rx="30" ry="11" fill="url(#wG)" opacity="0.5"/>
  <ellipse cx="50" cy="108" rx="25" ry="8" fill="#4FC3F7" opacity="0.25"/>
  <!-- Lily pads -->
  <ellipse cx="28" cy="106" rx="13" ry="6.5" fill="url(#padG)"/>
  <path d="M28 106 L28 99.5" stroke="#1B5E20" stroke-width="1" fill="none" opacity="0.3"/>
  <ellipse cx="70" cy="103" rx="11" ry="5.5" fill="#4CAF50"/>
  <ellipse cx="50" cy="100" rx="15" ry="6.5" fill="#388E3C"/>
  <ellipse cx="50" cy="99" rx="8" ry="3" fill="#4CAF50" opacity="0.2"/>
  <!-- Stem -->
  <path d="M50 95 Q48 78 46 56" stroke="#558B2F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Lotus -->
  <g transform="translate(46, 36)">
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="url(#pG)" transform="rotate(0 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#F06292" transform="rotate(36 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#EC407A" transform="rotate(72 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="url(#pG)" transform="rotate(108 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#F06292" transform="rotate(144 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#EC407A" transform="rotate(180 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="url(#pG)" transform="rotate(216 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#F06292" transform="rotate(252 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="#EC407A" transform="rotate(288 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="13" fill="url(#pG)" transform="rotate(324 0 0)"/>
    <!-- Inner petals -->
    <ellipse cx="0" cy="-7" rx="3.5" ry="8" fill="#FCE4EC" transform="rotate(18 0 0)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="8" fill="#FCE4EC" transform="rotate(90 0 0)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="8" fill="#FCE4EC" transform="rotate(162 0 0)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="8" fill="#FCE4EC" transform="rotate(234 0 0)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="8" fill="#FCE4EC" transform="rotate(306 0 0)"/>
    <!-- Seed pod -->
    <circle cx="0" cy="0" r="5.5" fill="#FFEB3B"/>
    <circle cx="0" cy="0" r="3.5" fill="#FFF9C4" opacity="0.3" filter="url(#gl)"/>
    <circle cx="-2" cy="-1" r="1.2" fill="#FBC02D" opacity="0.6"/>
    <circle cx="2" cy="-1" r="1.2" fill="#FBC02D" opacity="0.6"/>
    <circle cx="0" cy="2" r="1" fill="#FBC02D" opacity="0.5"/>
  </g>
</svg>

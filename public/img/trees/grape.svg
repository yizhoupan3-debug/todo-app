  </g>
  <!-- Tendrils -->
  <path d="M42 32 Q40 26 44 22 Q48 26 46 30" stroke="#9CCC65" stroke-width="1" fill="none"/>
  <path d="M62 40 Q66 34 64 28 Q60 32 62 36" stroke="#9CCC65" stroke-width="1" fill="none"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="vG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4E342E"/>
      <stop offset="50%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#4E342E"/>
    </linearGradient>
    <radialGradient id="gG" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </radialGradient>
    <radialGradient id="lfG" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <filter id="sh"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="24" ry="7" fill="#3E2723" opacity="0.18" filter="url(#sh)"/>
  <!-- Vine trunk -->
  <path d="M50 112 Q44 90 40 64 Q38 48 42 32" stroke="url(#vG)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M42 44 Q50 36 58 40 Q65 48 62 58" stroke="#795548" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Bark texture -->
  <path d="M50 112 Q45 92 42 68" stroke="#8D6E63" stroke-width="1" fill="none" opacity="0.15"/>
  <!-- Leaves -->
  <path d="M33 56 Q22 46 26 34 Q30 40 33 56Z" fill="url(#lfG)"/>
  <path d="M33 56 Q20 52 16 40 Q24 46 33 56Z" fill="#4CAF50" opacity="0.6"/>
  <path d="M62 48 Q72 36 70 26 Q66 34 62 48Z" fill="url(#lfG)"/>
  <path d="M62 48 Q76 40 78 30 Q72 38 62 48Z" fill="#4CAF50" opacity="0.6"/>
  <path d="M46 72 Q36 65 30 52 Q38 62 46 72Z" fill="#66BB6A"/>
  <!-- Grape clusters -->
  <g transform="translate(57, 66)">
    <circle cx="0" cy="0" r="4.5" fill="url(#gG)"/>
    <circle cx="0" cy="0" r="2" fill="#E1BEE7" opacity="0.15"/>
    <circle cx="7.5" cy="2" r="4.5" fill="#9C27B0"/>
    <circle cx="7" cy="1" r="1.8" fill="#E1BEE7" opacity="0.12"/>
    <circle cx="3.5" cy="6.5" r="4.5" fill="#8E24AA"/>
    <circle cx="-4.5" cy="3" r="4" fill="#6A1B9A"/>
    <circle cx="10.5" cy="6.5" r="4" fill="#AB47BC"/>
    <circle cx="0" cy="10" r="4" fill="url(#gG)"/>
    <circle cx="6.5" cy="11" r="3.5" fill="#9C27B0"/>
    <circle cx="3" cy="14" r="3.5" fill="#8E24AA"/>
  </g>
  <!-- Small cluster -->
  <g transform="translate(30, 82)">
    <circle cx="0" cy="0" r="4" fill="url(#gG)"/>
    <circle cx="6.5" cy="2" r="4" fill="#9C27B0"/>
    <circle cx="3" cy="5.5" r="3.5" fill="#8E24AA"/>
    <circle cx="-2.5" cy="4" r="3.5" fill="#6A1B9A"/>

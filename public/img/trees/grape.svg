<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="vG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E2723"/>
      <stop offset="50%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <radialGradient id="gG" cx="38%" cy="28%">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="40%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </radialGradient>
    <radialGradient id="lfG" cx="35%" cy="25%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <filter id="s"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="28" ry="8" fill="#3E2723" opacity="0.15" filter="url(#s)"/>
  <!-- Thin winding vine — not thick stick -->
  <path d="M50 112 Q40 96 34 80 Q28 66 34 50 Q40 40 48 36" stroke="url(#vG)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M48 36 Q56 34 64 38 Q72 44 76 52" stroke="#795548" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Curly tendrils -->
  <path d="M48 36 Q44 28 40 26 Q38 30 42 34" stroke="#8BC34A" stroke-width="1.5" fill="none"/>
  <path d="M76 52 Q80 44 78 40 Q74 44 76 50" stroke="#8BC34A" stroke-width="1.5" fill="none"/>
  <path d="M36 66 Q30 58 26 56 Q24 60 28 64" stroke="#7CB342" stroke-width="1.2" fill="none"/>
  <!-- Large lobed leaves (grape leaves are palmate, like maple) -->
  <path d="M30 68 Q14 54 8 60 Q6 68 14 72 Q22 74 30 68Z" fill="url(#lfG)"/>
  <path d="M30 68 Q16 58 12 62" fill="#E8F5E9" opacity="0.1"/>
  <path d="M68 42 Q82 28 88 36 Q86 44 78 48 Q70 48 68 42Z" fill="#66BB6A"/>
  <path d="M38 52 Q26 40 22 46 Q26 54 38 52Z" fill="#81C784"/>
  <path d="M56 38 Q66 28 72 34 Q68 40 56 38Z" fill="url(#lfG)"/>
  <!-- Grape cluster 1 — CONICAL/pyramidal arrangement -->
  <g transform="translate(56 60)">
    <!-- Top row — 1 -->
    <circle cx="4" cy="0" r="5" fill="url(#gG)"/>
    <!-- Row 2 — 2 -->
    <circle cx="0" cy="8" r="5" fill="#8E24AA"/>
    <circle cx="9" cy="7" r="5" fill="url(#gG)"/>
    <!-- Row 3 — 3 -->
    <circle cx="-4" cy="14" r="5" fill="#6A1B9A"/>
    <circle cx="4" cy="15" r="5" fill="#9C27B0"/>
    <circle cx="12" cy="14" r="5" fill="url(#gG)"/>
    <!-- Row 4 — 3 -->
    <circle cx="-2" cy="22" r="4.5" fill="#8E24AA"/>
    <circle cx="6" cy="22" r="4.5" fill="url(#gG)"/>
    <circle cx="14" cy="21" r="4" fill="#AB47BC"/>
    <!-- Bottom — 2 -->
    <circle cx="2" cy="28" r="4" fill="#6A1B9A"/>
    <circle cx="10" cy="28" r="3.5" fill="#9C27B0"/>
  </g>
  <!-- Grape cluster 2 — smaller -->
  <g transform="translate(18 80)">
    <circle cx="2" cy="0" r="4.5" fill="url(#gG)"/>
    <circle cx="-2" cy="7" r="4.5" fill="#9C27B0"/>
    <circle cx="6" cy="6" r="4.5" fill="#8E24AA"/>
    <circle cx="0" cy="13" r="4" fill="url(#gG)"/>
    <circle cx="8" cy="12" r="4" fill="#6A1B9A"/>
    <circle cx="3" cy="18" r="3.5" fill="#AB47BC"/>
  </g>
</svg>

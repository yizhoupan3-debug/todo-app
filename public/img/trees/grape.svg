    <circle cx="13" cy="8" r="5" fill="#AB47BC"/>
    <circle cx="0" cy="12" r="5" fill="#9C27B0"/>
    <circle cx="9" cy="14" r="4.5" fill="url(#gG)"/>
    <circle cx="4" cy="18" r="4.5" fill="#8E24AA"/>

  <!-- Tassel at top of stalk -->
  <path d="M44 20 Q38 10 34 4" stroke="#BCAAA4" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M44 20 Q44 8 44 0" stroke="#A1887F" stroke-width="1.8" fill="none" stroke-linecap="round"/>

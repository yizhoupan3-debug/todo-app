  <path d="M50 28 Q46 20 42 16" stroke="#A1887F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M52 26 Q50 18 52 12" stroke="#BCAAA4" stroke-width="1" fill="none" stroke-linecap="round"/>

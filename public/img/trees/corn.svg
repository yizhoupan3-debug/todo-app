<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="sG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="50%" stop-color="#558B2F"/>
      <stop offset="100%" stop-color="#33691E"/>
    </linearGradient>
    <linearGradient id="cG" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="30%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="28" ry="8" fill="#3E2723" opacity="0.15" filter="url(#s)"/>
  <!-- Tall thick stalk -->
  <path d="M50 112 Q48 78 46 22" stroke="url(#sG)" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M50 112 Q49 80 47 24" stroke="#7CB342" stroke-width="1.5" fill="none" opacity="0.12"/>
  <!-- Long strap-like leaves — arching downward -->
  <path d="M46 82 Q8 62 2 76 Q10 86 46 82Z" fill="#558B2F"/>
  <path d="M48 68 Q84 50 90 62 Q82 72 48 68Z" fill="#689F38"/>
  <path d="M46 54 Q6 36 0 50 Q8 60 46 54Z" fill="#558B2F" opacity="0.9"/>
  <path d="M48 42 Q80 26 88 38 Q80 48 48 42Z" fill="#689F38" opacity="0.9"/>
  <!-- Corn ear — grows from SIDE of stalk (leaf axil), not top -->
  <path d="M48 58 Q54 56 58 54" stroke="#558B2F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M58 54 Q58 38 56 28 Q54 20 58 16 Q68 18 70 28 Q72 38 72 54Z" fill="url(#cG)"/>
  <!-- Kernel rows on ear -->
  <line x1="60" y1="52" x2="58" y2="20" stroke="#F9A825" stroke-width="0.7" opacity="0.3"/>
  <line x1="64" y1="52" x2="62" y2="18" stroke="#F9A825" stroke-width="0.7" opacity="0.3"/>
  <line x1="68" y1="52" x2="68" y2="20" stroke="#F9A825" stroke-width="0.7" opacity="0.3"/>
  <!-- Kernel bumps -->
  <circle cx="62" cy="28" r="2" fill="#FFD54F" opacity="0.35"/>
  <circle cx="66" cy="34" r="2" fill="#FFCA28" opacity="0.3"/>
  <circle cx="62" cy="40" r="2" fill="#FFD54F" opacity="0.35"/>
  <circle cx="66" cy="46" r="2" fill="#FFCA28" opacity="0.3"/>
  <!-- Husk wrapping ear -->
  <path d="M72 54 Q78 50 80 40 Q74 46 72 54Z" fill="#689F38"/>
  <path d="M58 54 Q52 50 50 40 Q56 46 58 54Z" fill="#558B2F"/>
  <!-- Silk from top of ear -->
  <path d="M58 18 Q54 10 50 6" stroke="#A1887F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M60 16 Q58 8 60 4" stroke="#BCAAA4" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M64 18 Q66 10 70 6" stroke="#A1887F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Tassel at actual top of stalk -->
  <path d="M46 22 Q42 14 38 8" stroke="#BCAAA4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M46 22 Q46 12 46 4" stroke="#A1887F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M46 22 Q50 14 54 8" stroke="#BCAAA4" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>

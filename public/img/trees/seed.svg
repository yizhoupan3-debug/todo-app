  <circle cx="58" cy="91" r="1.8" fill="#6D4C41" opacity="0.35"/>
  <!-- Seed -->
  <ellipse cx="50" cy="82" rx="7" ry="4.5" fill="url(#seedG)" transform="rotate(-15 50 82)"/>
  <ellipse cx="49" cy="81" rx="4" ry="2.5" fill="#EFEBE9" opacity="0.3" transform="rotate(-15 49 81)"/>
  <!-- Tiny sprout hint -->
  <path d="M50 79 Q51.5 74 54 76" stroke="#8BC34A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M53 76 Q55 73 54 76" fill="#AED581" opacity="0.6"/>

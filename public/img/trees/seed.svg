<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="soilG" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </radialGradient>
    <radialGradient id="seedG" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#D7CCC8"/>
      <stop offset="60%" stop-color="#BCAAA4"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </radialGradient>
    <filter id="ss"><feGaussianBlur stdDeviation="2" in="SourceGraphic"/></filter>
  </defs>
  <ellipse cx="50" cy="95" rx="30" ry="10" fill="#3E2723" opacity="0.2" filter="url(#ss)"/>
  <ellipse cx="50" cy="90" rx="24" ry="11" fill="url(#soilG)"/>
  <ellipse cx="50" cy="87" rx="20" ry="8" fill="#A1887F" opacity="0.4"/>
  <!-- Soil crumbs -->
  <circle cx="35" cy="88" r="2" fill="#6D4C41" opacity="0.5"/>
  <circle cx="62" cy="86" r="1.5" fill="#6D4C41" opacity="0.4"/>

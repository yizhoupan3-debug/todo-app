<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="stG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="50%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="pG" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="40%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
    <radialGradient id="ipG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <filter id="sh"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="24" ry="7" fill="#3E2723" opacity="0.18" filter="url(#sh)"/>
  <!-- Stem with thorns -->
  <path d="M50 112 Q50 90 50 62" stroke="url(#stG)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M50 112 Q50 92 50 65" stroke="#81C784" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Thorns -->
  <path d="M48 80 L44 77" stroke="#558B2F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M52 90 L56 87" stroke="#558B2F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M48 100 L44 97" stroke="#558B2F" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="40" cy="90" rx="7" ry="3.5" fill="#558B2F" transform="rotate(-20 40 90)"/>
  <ellipse cx="41" cy="89" rx="5" ry="2" fill="#7CB342" opacity="0.35" transform="rotate(-20 41 89)"/>
  <ellipse cx="60" cy="84" rx="7" ry="3" fill="#689F38" transform="rotate(15 60 84)"/>
  <ellipse cx="36" cy="76" rx="6" ry="2.5" fill="#558B2F" transform="rotate(-15 36 76)"/>
  <!-- Outer petals -->
  <g transform="translate(50, 44)">
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#pG)" transform="rotate(0 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="#F44336" transform="rotate(40 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#pG)" transform="rotate(80 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="#EF5350" transform="rotate(120 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#pG)" transform="rotate(160 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="#F44336" transform="rotate(200 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#pG)" transform="rotate(240 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="#EF5350" transform="rotate(280 0 0)"/>
    <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#pG)" transform="rotate(320 0 0)"/>
    <!-- Inner petals -->
    <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="url(#ipG)" transform="rotate(20 0 0)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="url(#ipG)" transform="rotate(100 0 0)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="url(#ipG)" transform="rotate(180 0 0)"/>
    <ellipse cx="0" cy="-7" rx="4" ry="7.5" fill="url(#ipG)" transform="rotate(260 0 0)"/>
    <!-- Heart -->
    <circle cx="0" cy="0" r="4.5" fill="#FFEB3B"/>
    <circle cx="-1" cy="-1" r="1.5" fill="#FFF9C4" opacity="0.4"/>
  </g>
</svg>

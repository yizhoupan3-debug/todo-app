<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <radialGradient id="pG" cx="38%" cy="25%">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="35%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </radialGradient>
    <radialGradient id="iG" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </radialGradient>
    <linearGradient id="sG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="50%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <filter id="s"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <ellipse cx="50" cy="114" rx="26" ry="8" fill="#3E2723" opacity="0.15" filter="url(#s)"/>
  <!-- Stem -->
  <path d="M50 112 Q48 88 46 60" stroke="url(#sG)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M50 112 Q49 90 47 62" stroke="#66BB6A" stroke-width="1.2" fill="none" opacity="0.15"/>
  <!-- Thorns -->
  <path d="M47 80 L42 76" stroke="#33691E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M49 92 L54 88" stroke="#33691E" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M47 100 L42 96" stroke="#33691E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M46 92 Q28 82 18 88 Q26 94 46 92Z" fill="#558B2F"/>
  <path d="M46 82 Q60 72 72 78 Q64 84 46 82Z" fill="#689F38"/>
  <path d="M46 74 Q32 66 22 72 Q30 78 46 74Z" fill="#558B2F"/>
  <!-- Rose flower — big layered petals -->
  <g transform="translate(46, 38)">
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#pG)" transform="rotate(0 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="#E53935" transform="rotate(40 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#pG)" transform="rotate(80 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="#EF5350" transform="rotate(120 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#pG)" transform="rotate(160 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="#E53935" transform="rotate(200 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#pG)" transform="rotate(240 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="#EF5350" transform="rotate(280 0 0)"/>
    <ellipse cx="0" cy="-14" rx="7.5" ry="13" fill="url(#pG)" transform="rotate(320 0 0)"/>
    <!-- Inner layer -->
    <ellipse cx="0" cy="-9" rx="5" ry="9" fill="url(#iG)" transform="rotate(20 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9" fill="url(#iG)" transform="rotate(110 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9" fill="url(#iG)" transform="rotate(200 0 0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="9" fill="url(#iG)" transform="rotate(290 0 0)"/>
    <!-- Heart -->
    <circle cx="0" cy="0" r="5.5" fill="#FFEB3B"/>
    <circle cx="-1.5" cy="-1" r="2" fill="#FFF9C4" opacity="0.35"/>
  </g>
</svg>

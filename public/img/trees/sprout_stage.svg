  <ellipse cx="50" cy="96" rx="18" ry="7" fill="#795548"/>
  <!-- Stem -->
  <path d="M50 96 Q49 78 50 65" stroke="#66BB6A" stroke-width="3" fill="none" stroke-linecap="round"/>

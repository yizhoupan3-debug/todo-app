<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Coin body -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGrad)" stroke="#B8860B" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="#DAA520" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>

  <!-- Cat ears -->
  <path d="M18 18 L14 8 L24 14 Z" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <path d="M46 18 L50 8 L40 14 Z" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
  <!-- Inner ears -->
  <path d="M18.5 17 L16 10 L23 14.5 Z" fill="#E8B828" opacity="0.6"/>
  <path d="M45.5 17 L48 10 L41 14.5 Z" fill="#E8B828" opacity="0.6"/>

  <!-- Cat face -->
  <ellipse cx="32" cy="34" rx="14" ry="12" fill="#DAA520" opacity="0.3"/>

  <!-- Eyes -->
  <ellipse cx="25" cy="30" rx="2.8" ry="3.2" fill="#5D4037"/>
  <ellipse cx="39" cy="30" rx="2.8" ry="3.2" fill="#5D4037"/>
  <!-- Eye highlights -->
  <circle cx="26" cy="28.5" r="1" fill="white" opacity="0.8"/>
  <circle cx="40" cy="28.5" r="1" fill="white" opacity="0.8"/>

  <!-- Nose -->
  <path d="M32 35 L30 37.5 L34 37.5 Z" fill="#E57373"/>

  <!-- Mouth -->
  <path d="M30 37.5 Q32 40 34 37.5" fill="none" stroke="#5D4037" stroke-width="1" stroke-linecap="round"/>
  <path d="M28 38 Q30 37.5 30 37.5" fill="none" stroke="#5D4037" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M36 38 Q34 37.5 34 37.5" fill="none" stroke="#5D4037" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="10" y1="33" x2="22" y2="35" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="10" y1="37" x2="22" y2="37" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="10" y1="41" x2="22" y2="39" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="54" y1="33" x2="42" y2="35" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="54" y1="37" x2="42" y2="37" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="54" y1="41" x2="42" y2="39" stroke="#B8860B" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Coin shine -->
  <path d="M15 15 Q20 10 28 12 Q22 16 18 22 Q14 19 15 15Z" fill="white" opacity="0.15"/>

  <defs>
    <radialGradient id="coinGrad" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </radialGradient>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="100%" stop-color="#D4991A"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFEB80"/>
      <stop offset="100%" stop-color="#E8B512"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#B8860B" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Outer coin body -->
  <circle cx="100" cy="100" r="95" fill="url(#coinGrad)" filter="url(#shadow)"/>
  
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#B8860B" stroke-width="3"/>
  
  <!-- Decorative dots around rim -->
  <g fill="#E8B512" opacity="0.6">
    <circle cx="100" cy="12" r="3"/>
    <circle cx="143" cy="18" r="3"/>
    <circle cx="178" cy="43" r="3"/>
    <circle cx="193" cy="80" r="3"/>
    <circle cx="193" cy="120" r="3"/>
    <circle cx="178" cy="157" r="3"/>
    <circle cx="143" cy="182" r="3"/>
    <circle cx="100" cy="188" r="3"/>
    <circle cx="57" cy="182" r="3"/>
    <circle cx="22" cy="157" r="3"/>
    <circle cx="7" cy="120" r="3"/>
    <circle cx="7" cy="80" r="3"/>
    <circle cx="22" cy="43" r="3"/>
    <circle cx="57" cy="18" r="3"/>
  </g>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="75" fill="url(#innerGrad)"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#C49B17" stroke-width="2"/>
  
  <!-- Cat head silhouette -->
  <path d="
    M 60 120
    Q 60 75, 65 65
    L 55 30
    L 80 55
    Q 90 48, 100 46
    Q 110 48, 120 55
    L 145 30
    L 135 65
    Q 140 75, 140 120
    Q 140 148, 100 150
    Q 60 148, 60 120
    Z
  " fill="url(#catGrad)" stroke="#C49B17" stroke-width="1.5"/>
  
  <!-- Cat eyes -->
  <ellipse cx="82" cy="90" rx="7" ry="8" fill="#B8860B"/>
  <ellipse cx="118" cy="90" rx="7" ry="8" fill="#B8860B"/>
  
  <!-- Eye shine -->
  <circle cx="84" cy="87" r="2.5" fill="#FFE55C" opacity="0.7"/>
  <circle cx="120" cy="87" r="2.5" fill="#FFE55C" opacity="0.7"/>
  
  <!-- Cat nose -->
  <path d="M 96 104 L 100 100 L 104 104 Z" fill="#B8860B"/>
  
  <!-- Cat mouth -->
  <path d="M 100 104 Q 95 112, 88 110" fill="none" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 100 104 Q 105 112, 112 110" fill="none" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="72" y1="98" x2="50" y2="92" stroke="#C49B17" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="72" y1="104" x2="48" y2="106" stroke="#C49B17" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="128" y1="98" x2="150" y2="92" stroke="#C49B17" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="128" y1="104" x2="152" y2="106" stroke="#C49B17" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Star on forehead -->
  <polygon points="100,60 103,68 112,68 105,73 108,82 100,77 92,82 95,73 88,68 97,68" fill="#FFE55C" opacity="0.8"/>
  
  <!-- Coin shine -->
  <ellipse cx="70" cy="45" rx="18" ry="8" fill="white" opacity="0.15" transform="rotate(-30 70 45)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="outerRim" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F2D44F"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6B0A"/>
    </radialGradient>
    <radialGradient id="innerDisc" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="45%" stop-color="#E8B812"/>
      <stop offset="100%" stop-color="#B8880C"/>
    </radialGradient>
    <radialGradient id="groove" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#C89A0E"/>
      <stop offset="100%" stop-color="#7A5A06"/>
    </radialGradient>
    <linearGradient id="emboss" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFE878"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#9B7209"/>
    </linearGradient>
    <linearGradient id="embossLight" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFE878"/>
      <stop offset="100%" stop-color="#C89A0E"/>
    </linearGradient>
    <pattern id="stripes" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#8B6B0A" opacity="0.3"/>
    </pattern>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4A3500" flood-opacity="0.4"/>
    </filter>
    <filter id="emblemGlow">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#6B4E00" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ===== COIN BODY ===== -->
  <!-- Outer rim -->
  <circle cx="100" cy="100" r="96" fill="url(#outerRim)" filter="url(#coinShadow)"/>
  <circle cx="100" cy="100" r="96" fill="url(#stripes)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#8B6B0A" stroke-width="2"/>

  <!-- Groove -->
  <circle cx="100" cy="100" r="78" fill="url(#groove)"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#6B4E00" stroke-width="2.5"/>

  <!-- Inner disc -->
  <circle cx="100" cy="100" r="70" fill="url(#innerDisc)"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#9B7209" stroke-width="1.5"/>

  <!-- ===== CAT EMBLEM (larger, centered) ===== -->
  <g filter="url(#emblemGlow)">

    <!-- Cat ears - big, sharp, prominent -->
    <!-- Left ear -->
    <polygon points="62,60 80,36 52,22" fill="url(#emboss)" stroke="#8B6B0A" stroke-width="2" stroke-linejoin="round"/>
    <!-- Right ear -->
    <polygon points="138,60 120,36 148,22" fill="url(#emboss)" stroke="#8B6B0A" stroke-width="2" stroke-linejoin="round"/>

    <!-- Head bridge connecting ears -->
    <path d="
      M 62,60
      C 66,50, 74,42, 80,36
      Q 88,48, 100,50
      Q 112,48, 120,36
      C 126,42, 134,50, 138,60
    " fill="url(#emboss)" stroke="#8B6B0A" stroke-width="2" stroke-linejoin="round"/>

    <!-- Central eye ring (large) -->
    <circle cx="100" cy="78" r="22" fill="url(#groove)" stroke="#8B6B0A" stroke-width="3"/>
    <circle cx="100" cy="78" r="17" fill="url(#innerDisc)" stroke="#9B7209" stroke-width="1.2"/>
    <!-- Pupil -->
    <circle cx="100" cy="78" r="8" fill="url(#groove)" stroke="#8B6B0A" stroke-width="2"/>
    <!-- Eye shine -->
    <circle cx="96" cy="74" r="3" fill="#FFE878" opacity="0.45"/>

    <!-- Jagged teeth / jaw - wider, more symmetrical -->
    <path d="
      M 58,98
      L 66,82  L 74,98
      L 82,82  L 90,98
      L 100,82 L 110,98
      L 118,82 L 126,98
      L 134,82 L 142,98
      Q 142,136, 100,146
      Q 58,136, 58,98
      Z
    " fill="url(#emboss)" stroke="#8B6B0A" stroke-width="2" stroke-linejoin="round"/>

    <!-- Jaw inner highlight -->
    <path d="
      M 66,102
      L 72,90  L 78,102
      L 86,90  L 94,102
      L 102,90 L 110,102
      L 118,90 L 124,102
      L 130,90 L 136,102
      Q 134,130, 100,138
      Q 66,130, 66,102
      Z
    " fill="#D4A017" opacity="0.25"/>
  </g>

  <!-- ===== HIGHLIGHTS ===== -->
  <ellipse cx="65" cy="48" rx="30" ry="14" fill="white" opacity="0.12" transform="rotate(-35 65 48)"/>
  <ellipse cx="48" cy="35" rx="10" ry="4" fill="white" opacity="0.18" transform="rotate(-40 48 35)"/>
</svg>

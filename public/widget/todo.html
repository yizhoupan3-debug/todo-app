<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日待办</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: rgba(12, 14, 24, 0.82);
            --card: rgba(25, 28, 53, 0.7);
            --card-hover: rgba(33, 36, 63, 0.8);
            --border: rgba(130, 140, 255, 0.08);
            --text: #e8eafc;
            --text2: #8b8fb0;
            --text3: #5c5f80;
            --accent: #818cf8;
            --accent2: #a5b4fc;
            --done: #22c55e;
            --high: #ef4444;
            --med: #f59e0b;
            --low: #22c55e;
            --radius: 12px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
            background: transparent;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow: hidden;
            font-variant-numeric: tabular-nums;
        }

        .widget {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* Header */
        .widget-header {
            padding: 16px 18px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: baseline;
            gap: 8px
        }

        .header-date {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px
        }

        .header-weekday {
            font-size: 13px;
            color: var(--accent2);
            font-weight: 400
        }

        .header-count {
            font-size: 12px;
            color: var(--text3);
            background: rgba(129, 140, 248, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Person pills */
        .person-bar {
            display: flex;
            gap: 6px;
            padding: 10px 18px 8px;
            flex-shrink: 0;
        }

        .person-pill {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .person-pill.active {
            background: rgba(129, 140, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent2);
            box-shadow: 0 2px 8px rgba(129, 140, 248, 0.15);
        }

        .person-pill:hover {
            background: rgba(129, 140, 248, 0.1);
            transform: translateY(-1px);
        }

        /* Task list */
        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px 12px;
            scrollbar-width: thin;
            scrollbar-color: rgba(129, 140, 248, 0.2) transparent;
        }

        .task-list::-webkit-scrollbar {
            width: 4px
        }

        .task-list::-webkit-scrollbar-thumb {
            background: rgba(129, 140, 248, 0.2);
            border-radius: 4px
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            transition: background 0.2s, transform 0.15s;
            cursor: default;
            position: relative;
            animation: itemSlideIn 0.3s ease-out both;
        }

        @keyframes itemSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            background: var(--card-hover);
            transform: translateX(2px);
        }

        .task-item.done {
            opacity: 0.45
        }

        .task-item.done .task-title {
            text-decoration: line-through
        }

        /* Priority bar */
        .task-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            border-radius: 2px;
        }

        .task-item.p1::before {
            background: var(--high)
        }

        .task-item.p2::before {
            background: var(--med)
        }

        .task-item.p3::before {
            background: var(--low)
        }

        /* Checkbox */
        .task-check {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--text3);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .task-check:hover {
            border-color: var(--accent)
        }

        .task-item.done .task-check {
            border-color: var(--done);
            background: var(--done);
            animation: checkPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes checkPop {
            0% {
                transform: scale(0.8);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .task-item.done .task-check::after {
            content: '✓';
            color: #fff;
            font-size: 11px;
            font-weight: 700;
        }

        .task-body {
            flex: 1;
            min-width: 0
        }

        .task-title {
            font-size: 13px;
            font-weight: 450;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-meta {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px;
            display: flex;
            gap: 8px;
        }

        .task-time {
            color: var(--accent2)
        }

        .task-cat {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .cat-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Empty */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text3);
            font-size: 14px;
        }

        .empty-state .emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 8px
        }

        /* Footer */
        .widget-footer {
            padding: 10px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text3);
            flex-shrink: 0;
        }

        .progress-bar {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--done));
            border-radius: 2px;
            transition: width 0.4s ease;
            box-shadow: 0 0 6px rgba(129, 140, 248, 0.3);
        }
    </style>
</head>

<body>
    <div class="widget">
        <div class="widget-header">
            <div class="header-left">
                <span class="header-date" id="w-date"></span>
                <span class="header-weekday" id="w-weekday"></span>
            </div>
            <span class="header-count" id="w-count"></span>
        </div>
        <div class="person-bar" id="w-persons">
            <button class="person-pill active" data-a="all">全部</button>
            <button class="person-pill" data-a="潘潘">潘潘</button>
            <button class="person-pill" data-a="蒲蒲">蒲蒲</button>
        </div>
        <div class="task-list" id="w-list"></div>
        <div class="widget-footer">
            <span id="w-progress-text"></span>
            <div class="progress-bar">
                <div class="progress-fill" id="w-progress"></div>
            </div>
        </div>
    </div>

    <script>
        const API = location.origin;
        const WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        let assignee = 'all';

        function today() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function renderHeader() {
            const d = new Date();
            document.getElementById('w-date').textContent = `${d.getMonth() + 1}月${d.getDate()}日`;
            document.getElementById('w-weekday').textContent = WEEKDAYS[d.getDay()];
        }

        async function loadTasks() {
            const date = today();
            let url = `${API}/api/tasks?date=${date}`;
            if (assignee !== 'all') url += `&assignee=${encodeURIComponent(assignee)}`;

            try {
                const res = await fetch(url);
                const tasks = await res.json();
                renderTasks(tasks);
            } catch (e) {
                console.error('Failed to load tasks:', e);
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('w-list');
            const todo = tasks.filter(t => t.status !== 'done');
            const done = tasks.filter(t => t.status === 'done');
            const all = [...todo, ...done];

            document.getElementById('w-count').textContent = `${done.length}/${tasks.length} 完成`;

            const total = tasks.length;
            const pct = total ? Math.round(done.length / total * 100) : 0;
            document.getElementById('w-progress').style.width = pct + '%';
            document.getElementById('w-progress-text').textContent = `${pct}% 完成`;

            if (all.length === 0) {
                list.innerHTML = '<div class="empty-state"><span class="emoji">🎉</span>今天没有任务</div>';
                return;
            }

            list.innerHTML = all.map(t => {
                const isDone = t.status === 'done';
                const pClass = `p${t.priority || 2}`;
                const time = t.due_time ? t.due_time.slice(0, 5) : '';
                const endTime = t.end_time ? t.end_time.slice(0, 5) : '';
                const timeDisplay = time ? (endTime ? `${time} - ${endTime}` : time) : '';
                const cat = t.category_name
                    ? `<span class="task-cat"><span class="cat-dot" style="background:${t.category_color || '#6366f1'}"></span>${t.category_icon || ''} ${t.category_name}</span>`
                    : '';
                return `
      <div class="task-item ${isDone ? 'done' : ''} ${pClass}" data-id="${t.id}">
        <button class="task-check" onclick="toggleTask(${t.id},'${isDone ? 'todo' : 'done'}')"></button>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            ${timeDisplay ? `<span class="task-time">${timeDisplay}</span>` : ''}
            ${cat}
          </div>
        </div>
      </div>`;
            }).join('');
        }

        async function toggleTask(id, newStatus) {
            try {
                await fetch(`${API}/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                loadTasks();
            } catch (e) { console.error(e); }
        }

        // Person filter
        document.getElementById('w-persons').addEventListener('click', e => {
            const pill = e.target.closest('.person-pill');
            if (!pill) return;
            assignee = pill.dataset.a;
            document.querySelectorAll('.person-pill').forEach(p => p.classList.toggle('active', p.dataset.a === assignee));
            loadTasks();
        });

        // Init
        renderHeader();
        loadTasks();
        setInterval(loadTasks, 60000);
        // Refresh date at midnight
        setInterval(renderHeader, 60000);
    </script>
</body>

</html>

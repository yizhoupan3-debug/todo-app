<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: rgba(12, 14, 24, 0.82);
            --card: rgba(25, 28, 53, 0.65);
            --card-hover: rgba(33, 36, 63, 0.8);
            --card-active: rgba(50, 55, 90, 0.6);
            --border: rgba(130, 140, 255, 0.08);
            --border2: rgba(130, 140, 255, 0.14);
            --text: #e8eafc;
            --text2: #8b8fb0;
            --text3: #5c5f80;
            --accent: #818cf8;
            --accent2: #a5b4fc;
            --done: #22c55e;
            --todo-color: #f59e0b;
            --high: #ef4444;
            --med: #f59e0b;
            --low: #22c55e;
            --today: rgba(129, 140, 248, 0.18);
            --selected: rgba(129, 140, 248, 0.28);
            --radius: 14px;
        }

        html,
        body {
            height: 100%;
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: transparent;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow: hidden;
        }

        .widget {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        /* ── Header ── */
        .cal-header {
            padding: 14px 20px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .cal-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .cal-title .year {
            font-size: 13px;
            color: var(--text3);
            font-weight: 400
        }

        .cal-nav {
            display: flex;
            gap: 4px
        }

        .cal-nav button {
            background: transparent;
            border: none;
            color: var(--text2);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.15s;
        }

        .cal-nav button:hover {
            background: var(--card-hover);
            color: var(--text)
        }

        /* Person bar */
        .cal-person-bar {
            display: flex;
            gap: 6px;
            padding: 8px 20px;
            flex-shrink: 0;
        }

        .cal-pill {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .cal-pill.active {
            background: rgba(129, 140, 248, 0.15);
            border-color: var(--accent);
            color: var(--accent2);
        }

        /* ── Layout: calendar left, detail right ── */
        .cal-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        .cal-grid-wrap {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            padding: 6px 12px;
        }

        .cal-detail {
            width: 220px;
            flex-shrink: 0;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
        }

        .cal-detail.collapsed {
            width: 0;
            border: none;
            overflow: hidden
        }

        /* ── Weekday header ── */
        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 2px 0 6px;
            flex-shrink: 0;
        }

        .cal-weekdays span {
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
        }

        /* ── Day grid ── */
        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            flex: 1;
        }

        .cal-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 6px 2px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            min-height: 0;
        }

        .cal-day:hover {
            background: var(--card-hover)
        }

        .cal-day.today {
            background: var(--today)
        }

        .cal-day.selected {
            background: var(--selected);
            border: 1px solid rgba(129, 140, 248, 0.25)
        }

        .cal-day.other-month {
            opacity: 0.3
        }

        .cal-day-num {
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            margin-bottom: 4px;
        }

        .cal-day.today .cal-day-num {
            color: var(--accent2);
            font-weight: 700;
        }

        /* Task dots */
        .cal-dots {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }

        .cal-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .cal-dot.done {
            background: var(--done)
        }

        .cal-dot.todo {
            background: var(--todo-color)
        }

        /* ── Detail panel ── */
        .detail-header {
            padding: 12px 14px 8px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .detail-date {
            font-size: 14px;
            font-weight: 600
        }

        .detail-sub {
            font-size: 11px;
            color: var(--text3);
            margin-top: 2px
        }

        .detail-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(129, 140, 248, 0.15) transparent;
        }

        .detail-list::-webkit-scrollbar {
            width: 3px
        }

        .detail-list::-webkit-scrollbar-thumb {
            background: rgba(129, 140, 248, 0.15);
            border-radius: 3px
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 8px;
            transition: background 0.12s;
            position: relative;
        }

        .detail-item:hover {
            background: var(--card-hover)
        }

        .detail-item.done {
            opacity: 0.4
        }

        .detail-item.done .di-title {
            text-decoration: line-through
        }

        .detail-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 2.5px;
            height: 55%;
            border-radius: 2px;
        }

        .detail-item.p1::before {
            background: var(--high)
        }

        .detail-item.p2::before {
            background: var(--med)
        }

        .detail-item.p3::before {
            background: var(--low)
        }

        .di-check {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 1.5px solid var(--text3);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.15s;
        }

        .di-check:hover {
            border-color: var(--accent)
        }

        .detail-item.done .di-check {
            border-color: var(--done);
            background: var(--done);
        }

        .detail-item.done .di-check::after {
            content: '✓';
            color: #fff;
            font-size: 9px;
            font-weight: 700;
        }

        .di-body {
            flex: 1;
            min-width: 0
        }

        .di-title {
            font-size: 12px;
            font-weight: 450;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .di-time {
            font-size: 10px;
            color: var(--accent2);
            margin-top: 1px
        }

        .detail-empty {
            text-align: center;
            padding: 30px 10px;
            color: var(--text3);
            font-size: 12px;
        }

        /* ── Responsive: stack vertically when narrow ── */
        @media (max-width:480px) {
            .cal-body {
                flex-direction: column
            }

            .cal-detail {
                width: 100% !important;
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="widget">
        <div class="cal-header">
            <div class="cal-title">
                <span id="cal-month"></span>
                <span class="year" id="cal-year"></span>
            </div>
            <div class="cal-nav">
                <button id="cal-prev">‹</button>
                <button id="cal-today" style="font-size:12px">今</button>
                <button id="cal-next">›</button>
            </div>
        </div>
        <div class="cal-person-bar" id="cal-persons">
            <button class="cal-pill active" data-a="all">全部</button>
            <button class="cal-pill" data-a="潘潘">潘潘</button>
            <button class="cal-pill" data-a="蒲蒲">蒲蒲</button>
        </div>
        <div class="cal-body">
            <div class="cal-grid-wrap">
                <div class="cal-weekdays">
                    <span>日</span><span>一</span><span>二</span>
                    <span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="cal-days" id="cal-grid"></div>
            </div>
            <div class="cal-detail" id="cal-detail">
                <div class="detail-header">
                    <div class="detail-date" id="detail-date">选择日期</div>
                    <div class="detail-sub" id="detail-sub"></div>
                </div>
                <div class="detail-list" id="detail-list">
                    <div class="detail-empty">← 点击日期查看任务</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = location.origin;
        const WEEKDAYS = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        let curYear, curMonth, selectedDate = null, assignee = 'all';
        let summaryData = {};

        function todayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function setMonth(y, m) {
            curYear = y; curMonth = m;
            document.getElementById('cal-month').textContent = `${m}月`;
            document.getElementById('cal-year').textContent = y;
            loadMonth();
        }

        async function loadMonth() {
            const mm = `${curYear}-${String(curMonth).padStart(2, '0')}`;
            let url = `${API}/api/tasks/month-summary?month=${mm}`;
            if (assignee !== 'all') url += `&assignee=${encodeURIComponent(assignee)}`;

            try {
                const res = await fetch(url);
                const rows = await res.json();
                summaryData = {};
                for (const r of rows) {
                    if (!summaryData[r.due_date]) summaryData[r.due_date] = { todo: 0, done: 0 };
                    if (r.status === 'done') summaryData[r.due_date].done += r.count;
                    else summaryData[r.due_date].todo += r.count;
                }
                renderGrid();
            } catch (e) { console.error(e); }
        }

        function renderGrid() {
            const grid = document.getElementById('cal-grid');
            const firstDay = new Date(curYear, curMonth - 1, 1).getDay();
            const daysInMonth = new Date(curYear, curMonth, 0).getDate();
            const today = todayStr();

            // Previous month fill
            const prevDays = new Date(curYear, curMonth - 1, 0).getDate();
            let cells = '';

            for (let i = firstDay - 1; i >= 0; i--) {
                const d = prevDays - i;
                cells += `<div class="cal-day other-month"><span class="cal-day-num">${d}</span></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${curYear}-${String(curMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = dateStr === today;
                const isSelected = dateStr === selectedDate;
                const data = summaryData[dateStr];
                let dots = '';
                if (data) {
                    for (let i = 0; i < Math.min(data.done, 4); i++) dots += '<span class="cal-dot done"></span>';
                    for (let i = 0; i < Math.min(data.todo, 4); i++) dots += '<span class="cal-dot todo"></span>';
                }
                cells += `
      <div class="cal-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">
        <span class="cal-day-num">${d}</span>
        <div class="cal-dots">${dots}</div>
      </div>`;
            }

            // Next month fill
            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - totalCells % 7) % 7;
            for (let d = 1; d <= remaining; d++) {
                cells += `<div class="cal-day other-month"><span class="cal-day-num">${d}</span></div>`;
            }

            grid.innerHTML = cells;
        }

        async function selectDate(dateStr) {
            selectedDate = dateStr;
            renderGrid();

            const detail = document.getElementById('cal-detail');
            detail.classList.remove('collapsed');

            const d = new Date(dateStr + 'T00:00:00');
            document.getElementById('detail-date').textContent = `${d.getMonth() + 1}月${d.getDate()}日 ${WEEKDAYS[d.getDay()]}`;

            let url = `${API}/api/tasks?date=${dateStr}`;
            if (assignee !== 'all') url += `&assignee=${encodeURIComponent(assignee)}`;

            try {
                const res = await fetch(url);
                const tasks = await res.json();
                const todo = tasks.filter(t => t.status !== 'done');
                const done = tasks.filter(t => t.status === 'done');
                document.getElementById('detail-sub').textContent = `${done.length}/${tasks.length} 完成`;
                renderDetail([...todo, ...done]);
            } catch (e) { console.error(e); }
        }

        function renderDetail(tasks) {
            const list = document.getElementById('detail-list');
            if (tasks.length === 0) {
                list.innerHTML = '<div class="detail-empty">✨ 无任务</div>';
                return;
            }
            list.innerHTML = tasks.map(t => {
                const isDone = t.status === 'done';
                const time = t.due_time ? t.due_time.slice(0, 5) : '';
                const endTime = t.end_time ? t.end_time.slice(0, 5) : '';
                const timeDisplay = time ? (endTime ? `${time} - ${endTime}` : time) : '';
                return `
      <div class="detail-item ${isDone ? 'done' : ''} p${t.priority || 2}">
        <button class="di-check" onclick="toggleTask(${t.id},'${isDone ? 'todo' : 'done'}')"></button>
        <div class="di-body">
          <div class="di-title">${t.title}</div>
          ${timeDisplay ? `<div class="di-time">${timeDisplay}</div>` : ''}
        </div>
      </div>`;
            }).join('');
        }

        async function toggleTask(id, newStatus) {
            try {
                await fetch(`${API}/api/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                loadMonth();
                if (selectedDate) selectDate(selectedDate);
            } catch (e) { console.error(e); }
        }

        // Nav
        document.getElementById('cal-prev').onclick = () => {
            curMonth--;
            if (curMonth < 1) { curMonth = 12; curYear--; }
            setMonth(curYear, curMonth);
        };
        document.getElementById('cal-next').onclick = () => {
            curMonth++;
            if (curMonth > 12) { curMonth = 1; curYear++; }
            setMonth(curYear, curMonth);
        };
        document.getElementById('cal-today').onclick = () => {
            const d = new Date();
            setMonth(d.getFullYear(), d.getMonth() + 1);
            selectDate(todayStr());
        };

        // Person filter
        document.getElementById('cal-persons').addEventListener('click', e => {
            const pill = e.target.closest('.cal-pill');
            if (!pill) return;
            assignee = pill.dataset.a;
            document.querySelectorAll('.cal-pill').forEach(p => p.classList.toggle('active', p.dataset.a === assignee));
            loadMonth();
            if (selectedDate) selectDate(selectedDate);
        });

        // Init
        const now = new Date();
        setMonth(now.getFullYear(), now.getMonth() + 1);
        selectDate(todayStr());
        setInterval(() => { loadMonth(); if (selectedDate) selectDate(selectedDate); }, 60000);
    </script>
</body>

</html>
